name: Android APK Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Install npm dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Fix AndroidManifest files for AGP 8.x
      run: |
        # Remove package attribute from AndroidManifest.xml files (required for AGP 8.x)
        sed -i '/package=/d' node_modules/react-native-sqlite-storage/platforms/android/src/main/AndroidManifest.xml
        sed -i '/package=/d' node_modules/react-native-safe-area-context/android/src/main/AndroidManifest.xml
        sed -i '/package=/d' node_modules/@react-native-async-storage/async-storage/android/src/main/AndroidManifest.xml
        
    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk